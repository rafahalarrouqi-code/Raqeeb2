name: Driver Models Daily WhatsApp Report

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow twilio huggingface_hub
      - name: Install fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-dejavu-core fonts-liberation
      - name: Run daily report
        env:
          TWILIO_ACCOUNT_SID:    ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:     ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM:  ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO:    ${{ secrets.TWILIO_WHATSAPP_TO }}
          MEDIA_HOST_URL:        ${{ secrets.MEDIA_HOST_URL }}
          HF_TOKEN:              ${{ secrets.HF_TOKEN }}
        run: |
          cd scripts
          python run_daily.py
      - name: Upload table image as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: driver-models-table-${{ github.run_id }}
          path: scripts/table_output.png
          retention-days: 7
